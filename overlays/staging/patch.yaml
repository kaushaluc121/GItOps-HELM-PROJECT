spec:
  replicas: 2

  template:
    spec:
      nodeSelector:
        workload: app

      tolerations:
        - key: workload
          operator: Equal
          value: app
          effect: NoSchedule

      containers:
        - name: myapp
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
