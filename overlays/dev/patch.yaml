apiVersion: apps/v1
kind: Deployment

metadata:
  name: myapp

spec:
  replicas: 2

  template:
    spec:
      nodeSelector:
        workload: app

      tolerations:
        - key: workload
          operator: Equal
          value: app
          effect: NoSchedule

      containers:
        - name: myapp
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
