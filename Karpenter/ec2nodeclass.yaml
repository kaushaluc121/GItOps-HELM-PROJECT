apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass

metadata:
  name: default

spec:
  amiFamily: AL2023

  role: KarpenterNodeRole-eks-cluster

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-cluster

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: eks-cluster

  tags:
    Environment: dev
