apiVersion: argoproj.io/v1alpha1
kind: Application

metadata:
  name: karpenter
  namespace: argocd

spec:

  project: gitops-project

  source:
    repoURL: https://github.com/kaushaluc121/GItOps-HELM-PROJECT.git
    targetRevision: main
    path: karpenter

  destination:
    server: https://kubernetes.default.svc
    namespace: karpenter

  syncPolicy:
    automated:
      prune: true
      selfHeal: true

    syncOptions:
      - CreateNamespace=true
